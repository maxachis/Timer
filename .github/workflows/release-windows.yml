name: Release Windows Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: wails-app
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.23"
          cache-dependency-path: wails-app/go.sum

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: wails-app/frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        run: wails build -platform windows/amd64 -clean

      - name: Rename binary with tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          Copy-Item build/bin/timer.exe "build/bin/timer-$tag-windows-amd64.exe"

      - uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: wails-app/build/bin/timer-*.exe
          generate_release_notes: true

      - uses: actions/upload-artifact@v7
        if: github.event_name == 'workflow_dispatch'
        with:
          name: timer-windows-amd64
          path: wails-app/build/bin/timer.exe
